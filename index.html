<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharma General Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:Poppins;}
body {background:#f5f7fa;}

header {
  background:#2d6cdf;
  color:#fff;
  padding:15px;
  text-align:center;
}

header h1 {font-size:22px;}
header p {font-size:14px;}

.container {padding:15px;}

.filters {
  display:flex;
  gap:10px;
  overflow:auto;
  margin-bottom:15px;
}

.filters button {
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#ddd;
  cursor:pointer;
}

.filters button.active {
  background:#2d6cdf;
  color:#fff;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}

.card {
  background:#fff;
  border-radius:10px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

.card h4 {font-size:14px; margin:5px 0;}
.card p {font-size:12px; color:#666;}
.card .price {font-weight:600; margin:5px 0;}

.card button {
  width:100%;
  padding:8px;
  background:#2d6cdf;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* CART BUTTON */
.cart-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff4757;
  color:#fff;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}

/* CART MODAL */
.cart {
  position:fixed;
  top:0; right:-100%;
  width:100%; max-width:350px;
  height:100%;
  background:#fff;
  transition:0.3s;
  padding:15px;
  overflow:auto;
}

.cart.active {right:0;}

.cart h2 {margin-bottom:10px;}

.cart-item {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.cart-item button {margin:0 2px;}

.total {
  font-weight:bold;
  margin:10px 0;
}

.checkout {
  background:#2ed573;
  color:#fff;
  padding:10px;
  border:none;
  width:100%;
  cursor:pointer;
}

/* FORM */
form input, form textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#25D366;
  color:#fff;
  padding:10px;
  border-radius:20px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Sharma General Store</h1>
<p>Fresh groceries delivered to your door</p>
</header>

<div class="container">

<div class="filters" id="filters"></div>

<div class="grid" id="products"></div>

</div>

<div class="cart-btn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<div class="total" id="total"></div>

<button class="checkout" onclick="showForm()">Place Order</button>

<div id="formSection" style="display:none;">
<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" onsubmit="prepareOrder()">

<input type="text" name="name" placeholder="Your Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<textarea name="address" placeholder="Delivery Address" required></textarea>
<textarea name="instructions" placeholder="Special Instructions"></textarea>

<input type="hidden" name="order_details" id="orderDetails">

<button type="submit" class="checkout">Submit Order</button>
</form>
</div>

</div>

<a class="whatsapp" href="https://wa.me/919876543210" target="_blank">
WhatsApp
</a>

<script>

const products = [
{name:"Aashirvaad Atta", price:280, cat:"Groceries", img:"https://i.ibb.co/5F1c9p7/atta.jpg", desc:"Whole wheat flour"},
{name:"Amul Butter", price:280, cat:"Dairy", img:"https://i.ibb.co/3kZ3Q9k/butter.jpg", desc:"Fresh butter"},
{name:"Milk 1L", price:60, cat:"Dairy", img:"https://i.ibb.co/1v3J6Yy/milk.jpg", desc:"Fresh milk"},
{name:"Pepsi", price:40, cat:"Beverages", img:"https://i.ibb.co/VLZc7J1/pepsi.jpg", desc:"Cold drink"},
{name:"Maggi", price:14, cat:"Snacks", img:"https://i.ibb.co/tK7QzjK/maggi.jpg", desc:"Instant noodles"},
{name:"Biscuits", price:30, cat:"Snacks", img:"https://i.ibb.co/7W2Lk8S/biscuit.jpg", desc:"Crunchy biscuits"},
{name:"Rice 5kg", price:300, cat:"Groceries", img:"https://i.ibb.co/WcJ1Gv8/rice.jpg", desc:"Premium rice"},
{name:"Sugar 1kg", price:45, cat:"Groceries", img:"https://i.ibb.co/5F1c9p7/sugar.jpg", desc:"Pure sugar"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderProducts(filter="All"){
  const container = document.getElementById("products");
  container.innerHTML="";
  products.filter(p=>filter==="All"||p.cat===filter).forEach((p,i)=>{
    container.innerHTML+=`
    <div class="card">
      <img src="${p.img}" loading="lazy" alt="${p.name}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <div class="price">₹${p.price}</div>
      <button onclick="addToCart(${i})">Add to Cart</button>
    </div>`;
  });
}

function renderFilters(){
  const cats=["All",...new Set(products.map(p=>p.cat))];
  const f=document.getElementById("filters");
  cats.forEach(c=>{
    f.innerHTML+=`<button onclick="filter('${c}',this)">${c}</button>`;
  });
}

function filter(cat,btn){
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderProducts(cat);
}

function addToCart(i){
  const item=products[i];
  const existing=cart.find(p=>p.name===item.name);
  if(existing) existing.qty++;
  else cart.push({...item, qty:1});
  saveCart();
}

function saveCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  const c=document.getElementById("cartItems");
  const count=document.getElementById("count");
  c.innerHTML="";
  let total=0;
  cart.forEach((p,i)=>{
    total+=p.price*p.qty;
    c.innerHTML+=`
    <div class="cart-item">
      <div>${p.name} x${p.qty}</div>
      <div>
        <button onclick="changeQty(${i},-1)">-</button>
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="removeItem(${i})">x</button>
      </div>
    </div>`;
  });
  document.getElementById("total").innerText="Total: ₹"+total;
  count.innerText=cart.length;
}

function changeQty(i,val){
  cart[i].qty+=val;
  if(cart[i].qty<=0) cart.splice(i,1);
  saveCart();
}

function removeItem(i){
  cart.splice(i,1);
  saveCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function showForm(){
  document.getElementById("formSection").style.display="block";
}

function prepareOrder(){
  let text="";
  let total=0;
  cart.forEach(p=>{
    text+=`${p.name} x${p.qty} = ₹${p.price*p.qty}\n`;
    total+=p.price*p.qty;
  });
  text+="Total: ₹"+total;
  document.getElementById("orderDetails").value=text;

  localStorage.removeItem("cart");
  alert("Order placed! Shop will contact you on WhatsApp.");
}

renderFilters();
renderProducts();
renderCart();

</script>

</body>
</html>
